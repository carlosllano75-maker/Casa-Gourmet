<!DOCTYPE html> 
<html lang="es"> 
<head> 
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> 
  <title>Casa Gourmet POS Pro</title>
  
  <meta name="theme-color" content="#d4af37">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="icon" href="logo-casa-gourmet.jpg">
  <link rel="apple-touch-icon" href="logo-casa-gourmet.jpg">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style> 
    body{font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0b0b0b;color:#fff;margin:0;padding-bottom:50px;user-select:none;} 
    header{background:#111;padding:20px 10px;text-align:center;border-bottom:2px solid #d4af37} 
    .logo{max-height:80px;filter: drop-shadow(0 0 5px rgba(212,175,55,0.3))} 
    .grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:12px;padding:15px} 
    .card{background:#1a1a1a;border-radius:15px;padding:15px;text-align:center;border:1px solid #333;box-shadow: 0 4px 6px rgba(0,0,0,0.3)} 
    .card:active{transform: scale(0.98);background:#222}
    button{padding:12px 18px;border:none;border-radius:10px;background:#d4af37;color:#000;font-weight:bold;margin:5px;cursor:pointer;transition:0.2s} 
    button:active{opacity:0.7}
    .btn-danger{background:#ff4444 !important;color:#fff;padding:5px 10px}
    .lista{background:#111;padding:15px;border-radius:15px;margin:15px;border-left:4px solid #d4af37} 
    select, input{padding:12px;border-radius:10px;margin:8px 0;background:#222;color:#fff;border:1px solid #444;width:80%;max-width:300px}
    h3{color:#d4af37;margin-top:20px}
    #app{padding:10px;text-align:center}
    .item-pedido{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;border-bottom:1px dashed #333;padding-bottom:5px}
    .backup-box{background:#222; padding:15px; border-radius:15px; margin:15px auto; max-width:400px; border:1px dashed #444}
    
    #bloqueo {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0b0b0b; z-index: 9999; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px;
    }

    /* ESTILO DEL TICKET (Oculto en pantalla, blanco para impresión) */
    #ticket-wrapper {
      position: absolute; left: -9999px; top: 0;
    }
    .ticket-termico {
      width: 280px; background: white; color: black; padding: 15px;
      font-family: 'Courier New', Courier, monospace; text-align: center;
    }
    .ticket-termico b { font-size: 16px; }
    .sep { border-top: 1px dashed #000; margin: 10px 0; }
  </style> 
</head> 
<body> 

  <div id="ticket-wrapper">
    <div id="ticket-visual" class="ticket-termico">
      <img src="logo-casa-gourmet.jpg" style="width:120px; filter:grayscale(1)"><br>
      <b>CASA GOURMET</b><br>
      <small id="t-fecha"></small><br>
      <div class="sep"></div>
      <div id="t-items" style="text-align:left; font-size:12px"></div>
      <div class="sep"></div>
      <b id="t-total" style="font-size:18px"></b><br><br>
      <small>¡Gracias por su compra!</small>
    </div>
  </div>

  <div id="bloqueo">
    <img src="logo-casa-gourmet.jpg" style="width:120px; border-radius:50%; margin-bottom:20px">
    <h2 style="color:#d4af37">SISTEMA PROTEGIDO</h2>
    <p>Ingresa tu clave de licencia para activar:</p>
    <input type="password" id="passInput" placeholder="Clave de acceso" style="text-align:center"><br>
    <button onclick="validarLicencia()">Activar Sistema</button>
    <p id="errorMsg" style="color:red; display:none; margin-top:10px">Clave incorrecta</p>
  </div>

  <div id="contenido-app" style="display:none">
    <header> 
      <img src="logo-casa-gourmet.jpg" class="logo" onerror="this.src='https://via.placeholder.com/80/d4af37/000?text=Casa+Gourmet'"><br> 
      <b style="letter-spacing:1px">CASA GOURMET POS PRO</b> 
    </header> 
    
    <div style="text-align:center;padding:15px;background:#161616"> 
      <button onclick="verMesas()">🍽️ Mesas</button> 
      <button onclick="config()" style="background:#444;color:#fff">⚙️ Ajustes</button> 
    </div> 
    
    <div id="app"></div> 
  </div>

  <script> 
    const CLAVE_MAESTRA = "GOURMET2024";

    function validarLicencia() {
      if(document.getElementById("passInput").value === CLAVE_MAESTRA) {
        localStorage.setItem("licencia_activa", "true");
        chequearAcceso();
      } else { document.getElementById("errorMsg").style.display = "block"; }
    }

    function chequearAcceso() {
      if(localStorage.getItem("licencia_activa") === "true") {
        document.getElementById("bloqueo").style.display = "none";
        document.getElementById("contenido-app").style.display = "block";
        verMesas();
      }
    }

    let menu=JSON.parse(localStorage.getItem("menu")||"[]"); 
    let pedidos=JSON.parse(localStorage.getItem("pedidos")||"{}"); 
    let categorias=JSON.parse(localStorage.getItem("categorias")||"[]"); 
    let ventasDia=JSON.parse(localStorage.getItem("ventasDia")||"0");

    function guardar(){
      localStorage.setItem("menu",JSON.stringify(menu));
      localStorage.setItem("pedidos",JSON.stringify(pedidos));
      localStorage.setItem("categorias",JSON.stringify(categorias));
      localStorage.setItem("ventasDia",JSON.stringify(ventasDia));
    }

    function config(){ 
      let html="<h3>Ajustes del Sistema</h3>";
      html+=`<div class="backup-box" style="border-color:#28a745">
        <small style="color:#28a745">CIERRE DE CAJA</small><br>
        <b style="font-size:20px">$${ventasDia}</b><br>
        <button onclick="reiniciarCaja()" style="background:#222; color:#ff4444; font-size:11px">Limpiar Ventas del Día</button>
      </div>`;

      html+="<button onclick='nuevoProducto()'>+ Nuevo Producto</button>";
      html+=" <button onclick='configCategorias()'>📂 Categorías</button>";
      
      html += `
        <div class="backup-box">
          <small style="color:#888; display:block; margin-bottom:10px">COPIA DE SEGURIDAD DEL MENÚ</small>
          <button onclick="exportarMenu()" style="background:#444; color:#fff; padding:8px 12px">📤 Exportar</button>
          <button onclick="importarMenu()" style="background:#444; color:#fff; padding:8px 12px">📥 Importar</button>
        </div>
      `;

      if(menu.length===0) html+="<p style='color:#666'><br>No hay productos.</p>";
      menu.forEach((p,i)=>{ 
        html+=`<div class='card' style='margin:10px auto; max-width:400px; display:flex; justify-content:space-between; align-items:center'>
          <div style='text-align:left'><b>${p.nombre}</b><br><small>${p.categoria}</small></div>
          <div><b>$${p.precio}</b> <button class='btn-danger' onclick='eliminarProducto(${i})'>🗑️</button></div>
        </div>`; 
      }); 
      document.getElementById("app").innerHTML=html; 
    }

    function reiniciarCaja(){
      if(confirm("¿Seguro que quieres reiniciar las ventas del día a $0?")){
        ventasDia = 0; guardar(); config();
      }
    }

    // --- FUNCION DE COBRO E IMPRESIÓN ---
    function pagarMesa(m){
      if(!pedidos[m] || pedidos[m].length === 0) return;
      
      if(confirm("¿Cobrar Mesa "+m+" e imprimir ticket?")){
        let totalMesa = 0;
        let itemsHTML = "";
        pedidos[m].forEach(p => {
          totalMesa += p.precio;
          itemsHTML += `<div style="display:flex; justify-content:space-between"><span>${p.nombre}</span><span>$${p.precio}</span></div>`;
        });

        // Llenar ticket invisible
        document.getElementById("t-fecha").innerText = new Date().toLocaleString();
        document.getElementById("t-items").innerHTML = itemsHTML;
        document.getElementById("t-total").innerText = "TOTAL: $" + totalMesa;

        // Capturar y descargar imagen
        html2canvas(document.getElementById("ticket-visual")).then(canvas => {
          let link = document.createElement('a');
          link.download = 'ticket-mesa-'+m+'.png';
          link.href = canvas.toDataURL("image/png");
          link.click();
          
          // Sumar a ventas del día y limpiar mesa
          ventasDia += totalMesa;
          delete pedidos[m];
          guardar();
          verMesas();
          alert("Venta guardada y ticket descargado");
        });
      }
    }

    // --- RESTO DE FUNCIONES ---
    function exportarMenu() {
      const data = JSON.stringify({ menu, categorias });
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'menu_casa_gourmet.json';
      a.click();
    }

    function importarMenu() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const content = JSON.parse(ev.target.result);
            if (content.menu) {
              menu = content.menu; categorias = content.categorias;
              guardar(); config(); alert("✅ Importado");
            }
          } catch(err) { alert("Error"); }
        };
        reader.readAsText(e.target.files[0]);
      };
      input.click();
    }

    function nuevoProducto(){ 
      let html="<h3>Nuevo producto</h3>";
      html+="<input id='prodNombre' placeholder='Nombre'><br><input id='prodPrecio' type='number' placeholder='Precio'><br><select id='prodCategoria'>";
      categorias.forEach(c=>{ html+=`<option value="${c}">${c}</option>`; });
      html+="</select><br><br><button onclick='guardarNuevoProducto()'>✅ Guardar</button> <button onclick='config()' style='background:#444;color:#fff'>Cancelar</button>";
      document.getElementById("app").innerHTML=html;
    }

    function guardarNuevoProducto(){
      let n=document.getElementById("prodNombre").value, pr=document.getElementById("prodPrecio").value, c=document.getElementById("prodCategoria")?.value;
      if(n && pr && c){ menu.push({nombre:n,precio:parseFloat(pr),categoria:c}); guardar(); config(); }
      else{ alert("Completa los datos"); }
    }

    function eliminarProducto(i){ if(confirm("¿Eliminar?")){ menu.splice(i,1); guardar(); config(); } }

    function configCategorias(){
      let html="<h3>Categorías</h3><button onclick='nuevaCategoria()'>+ Nueva</button>";
      categorias.forEach((c,i)=>{ html+=`<div class='card'>${c} <button class='btn-danger' onclick='eliminarCategoria(${i})'>🗑️</button></div>`; });
      html+="<br><button onclick='config()'>Volver</button>";
      document.getElementById("app").innerHTML=html;
    }

    function nuevaCategoria(){
      let c=prompt("Nombre"); if(c && !categorias.includes(c)){ categorias.push(c); guardar(); configCategorias(); }
    }

    function eliminarCategoria(i){
      if(confirm("¿Eliminar?")){ menu=menu.filter(p=>p.categoria!==categorias[i]); categorias.splice(i,1); guardar(); configCategorias(); }
    }

    function verMesas(){ 
      let html="<div class='grid'>"; 
      for(let i=1;i<=12;i++){ 
        let total=0; if(pedidos[i]) pedidos[i].forEach(p=>total+=p.precio); 
        let colorMesa = total > 0 ? "border:1px solid #d4af37; background:#252115" : "";
        html+=`<div class='card' style='${colorMesa}'><b>Mesa ${i}</b><br><span style='color:${total>0?"#0f0":"#666"}'>$${total}</span> 
        <br><button onclick='abrirMesa(${i})'>${total>0?"Editar":"Abrir"}</button></div>`; 
      } 
      html+="</div>"; document.getElementById("app").innerHTML=html; 
    } 

    function abrirMesa(m){ 
      let html=`<h3>Mesa ${m}</h3>`; 
      let cats = [...new Set(menu.map(p=>p.categoria))];
      html+=`<select onchange='filtrarCategoria(${m},this.value)' style='width:90%'><option value="">Todo</option>`;
      cats.forEach(cat=>{ html+=`<option value="${cat}">${cat}</option>`; });
      html+="</select><div id='productos-container'>"+mostrarProductos(m,"")+"</div>"; 
      html+=mostrarLista(m); 
      html+=`<br><button onclick='enviarWhatsApp(${m})' style='background:#25D366; color:white; width:90%'>📱 WhatsApp</button>`;
      html+=`<br><button onclick='pagarMesa(${m})' style='background:#28a745; color:white; width:90%; margin-top:10px'>💰 Cobrar</button>`;
      html+=`<br><button onclick='verMesas()' style='background:#444; color:white; margin-top:10px'>⬅️ Volver</button>`; 
      document.getElementById("app").innerHTML=html; 
    } 

    function filtrarCategoria(m,cat){ document.getElementById('productos-container').innerHTML = mostrarProductos(m,cat); }
    function mostrarProductos(m,cat){ 
      let html="<div class='grid'>"; 
      menu.filter(p=>!cat || p.categoria===cat).forEach(p=>{
        html+=`<div class='card' style='padding:10px'>${p.nombre}<br><b>$${p.precio}</b><br><button onclick='agregar(${m},"${p.nombre}",${p.precio})'>➕</button></div>`; 
      }); 
      return html + "</div>"; 
    } 

    function agregar(m,n,pr){ if(!pedidos[m]) pedidos[m]=[]; pedidos[m].push({nombre:n,precio:pr}); guardar(); abrirMesa(m); }
    function mostrarLista(m){ 
      let html="<div class='lista'><b>📝 Pedido:</b><br>"; let total=0; 
      if(pedidos[m]){ pedidos[m].forEach((p,i)=>{ total+=p.precio; html+=`<div class='item-pedido'><span>${p.nombre}</span> <span>$${p.precio} <button class='btn-danger' onclick='eliminarItem(${m},${i})'>x</button></span></div>`; }); }
      return html + `<br><b>TOTAL: $${total}</b></div>`; 
    }
    function eliminarItem(m,i){ pedidos[m].splice(i,1); guardar(); abrirMesa(m); }

    function enviarWhatsApp(m) {
      if (!pedidos[m]) return;
      let texto = "*CASA GOURMET*\n*Mesa " + m + "*\n\n";
      let total = 0;
      pedidos[m].forEach(p => { texto += "- " + p.nombre + ": $" + p.precio + "\n"; total += p.precio; });
      texto += "\n*TOTAL: $" + total + "*";
      window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(texto), '_blank');
    }

    chequearAcceso();
  </script> 
</body> 
</html>
